[bdist_wheel]
universal=0

[pep8]
max-line-length = 100

[flake8]
# note: we ignore all 501s (line too long) anyway as they're taken care of by the formatter
max-line-length = 100
ignore = E731, E203, E402, W503, W504, F821, E501, B, C4, EXE, E111, E121, E114, E129, E131, E251, E125, E126
per-file-ignores =
    __init__.py: F401, F403, F405
    # ignore all errors in the mkdocs config file
    mkdocs.yml: ALL
exclude = venv

[pydocstyle]
select = D417 # Missing argument descriptions in the docstring
